    <div class="header">
      <a href="product.html" class="btn btn-primary">X</a>
      <p>My Cart </p>
      <div class="carticon"><i class="fa-solid fa-cart-shopping"></i><p id="count">1</p>
         
      </div>
      

  </div>
   <section>
      <div class="container">
         <div class="cart">
            <div class="col-md-12 col-lg-10 mx-auto">
               <div class="cart-item">
                  <div class="row">
                     <div class="col-md-7 center-item">
                        <h7>WEATHERING VEST</h7><img src="imgg/p1.jpeg" alt="">
                        
                     </div>

                     <div class="col-md-5 center-item">
                        <div class="input-group number-spinner">
                           <button id="P1-minus" class="btn btn-default"><i class="fas fa-minus"></i></button>
                           <input id="P1-number" type="text" min="0" class="form-control text-center" value="1">
                           <button id="P1-plus" class="btn btn-default"><i class="fas fa-plus"></i></button>
                        </div>
                        <h5>$ <span id="P1-total">150</span> </h5>
                     </div>
                  </div>
               </div>

               

               <div class="cart-item">
                  <div class="row g-2">

                     <div class="col-6">
                        <h5>Subtotal:</h5><h5>$<span id="sub-total">150</span></h5>
                        <h5>Tax:</h5><h5>$<span id="tax-amount">15</span></h5>
                        <h5>Total:</h5><h5>$<span id="total-price">165</span></h5>
                     </div>
                     
                  </div>
               </div>
               <div class="col-md-12 pt-4 pb-4">
                  <button type="button" class="btn btn-success check-out">Check Out</button>
               </div>
            </div>
         </div>
      </div>
   </section>
